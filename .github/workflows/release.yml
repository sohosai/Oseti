name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxi-dev libxrandr-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev libv4l-dev

      - name: Build Release
        run: cargo build --release

      - name: Rename Binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/release/Osechi target/release/Osechi-${{ matrix.os }}

      - name: Rename Binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/release/Osechi.exe target/release/Osechi-${{ matrix.os }}.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: osechi-${{ matrix.os }}
          path: target/release/Osechi-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          files: artifacts/Osechi-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
